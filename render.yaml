services:
  - type: web
    name: usa-stock-scanner
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 180 --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: cron
    name: outcome-evaluator
    env: python
    region: oregon
    plan: free
    schedule: "0 6 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import db; db.init_db(); from outcome_evaluator import evaluate_pending_outcomes; evaluate_pending_outcomes()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: auto-scan-morning
    env: python
    region: oregon
    plan: free
    schedule: "45 13 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import db; db.init_db(); from outcome_evaluator import auto_scan; auto_scan()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: auto-scan-midday
    env: python
    region: oregon
    plan: free
    schedule: "0 17 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import db; db.init_db(); from outcome_evaluator import auto_scan; auto_scan()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: auto-scan-afternoon
    env: python
    region: oregon
    plan: free
    schedule: "30 19 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import db; db.init_db(); from outcome_evaluator import auto_scan; auto_scan()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
